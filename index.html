<!doctype html>
<html>
<head>
<meta charset="utf-8">

<script async src="https://cdn.ampproject.org/v0.js"></script>

<!-- AMP Components -->


<script async custom-element="amp-form"
src="https://cdn.ampproject.org/v0/amp-form-0.1.js"></script>

<meta name="viewport" content="width=device-width,minimum-scale=1,initial-scale=1">

<style amp-custom>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f4f6f8;
margin:0;
padding:0;
}

.container{
max-width:600px;
margin:auto;
background:#ffffff;
object-fit: cover;
}

.header{
background:#104c57;
color:white;
text-align:center;
}

.title{
font-size:24px;
font-weight:bold;
}

.banner{
width:100%;
}

.content{
padding:20px;
}

.info-box{
background:#f1f5f9;
padding:15px;
border-radius:8px;
margin-bottom:15px;
}

.button{
display:inline-block;
background:#ff6b00;
color:white;
padding:12px 20px;
border-radius:6px;
text-decoration:none;
font-weight:bold;
margin-top:10px;
}

.footer{
background:#f1f1f1;
padding:15px;
text-align:center;
font-size:12px;
color:#666;
}

</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<amp-img
src="https://raw.githubusercontent.com/maulanairvan0812-wq/test-2/refs/heads/main/asset%20logo%202.png"
width="450"
height="60"
layout="responsive">

</amp-img>

<!-- IMAGE SLIDER -->


<amp-img
src="https://raw.githubusercontent.com/maulanairvan0812-wq/test-2/refs/heads/main/Frame%201261160560%201.png"
width="400"
height="250"
layout="responsive">
</amp-img>

<div style="background-color: #2C6165;" class="content">



<!-- RSVP FORM -->

<form style="background-color: whitesmoke; padding:10px ; border-radius: 10px;" method="post"
action-xhr="https://example.com/rsvp"
target="_top">
<div style="max-width:600px; margin:auto; background:#f5f5f5; padding:20px; border-radius:15px;">

  <!-- Nama -->
  <p style="font-weight:bold; color:#2f5d62;">Nama Lengkap</p>
  <input 
    type="text" 
    id="nama"
    placeholder="Masukan nama anda"
    style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd; margin-bottom:20px;"
  >

  <!-- WhatsApp -->
  <p style="font-weight:bold; color:#2f5d62;">Nomor WhatsApp aktif</p>
  <input 
    type="tel" 
    id="wa"
    placeholder="Masukan No. WhatsApp"
    style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd; margin-bottom:25px;"
  >

  <!-- Button -->
  <button onclick="kirimForm()" 
    style="width:100%; background:#ff6b00; color:white; padding:14px; border:none; border-radius:10px; font-size:16px; font-weight:bold; cursor:pointer;">
    Kirim & Daftar
  </button>


</div>

<!-- FOOTER -->

<!-- <div class="footer">
© 2026 Docquity  
</div> -->

</div>
<script>
function kirimForm() {
  const nama = document.getElementById("nama").value.trim();
  const wa = document.getElementById("wa").value.trim();

  if (nama === "") {
    alert("Nama lengkap wajib diisi!");
    return;
  }

  if (wa === "") {
    alert("Nomor WhatsApp wajib diisi!");
    return;
  }

  // validasi nomor sederhana (angka saja)
  if (!/^[0-9]+$/.test(wa)) {
    alert("Nomor WhatsApp harus berupa angka!");
    return;
  }

  // jika semua valid
  alert("Data berhasil dikirim!");

  //contoh redirect / kirim data
  window.location.href = "https://maulanairvan0812-wq.github.io/this-5/";
}
</script>
</body>
</html>
